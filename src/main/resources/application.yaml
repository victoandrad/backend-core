spring:
  application:
    name: backend

  datasource:
    url: jdbc:postgresql://localhost:5432/backend_db
    username: postgres
    password: 9910
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  liquibase:
    enabled: false

jwt:
  secret: secret
  expiration-time: 3600000